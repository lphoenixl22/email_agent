# Пример требований к лабораторной работе №1

lab_number: 1
description: "Разработка консольного приложения на Python"

tasks:
  - "Изучить основы языка Python"
  - "Разработать консольное приложение согласно варианту"
  - "Реализовать ввод/вывод данных"
  - "Обеспечить обработку ошибок"
  - "Протестировать программу с различными входными данными"
  - "Оформить отчет в соответствии с требованиями"

criteria:
  - name: "Выполнение всех пунктов задания"
    weight: 0.4
    description: "Программа реализует весь требуемый функционал"
  
  - name: "Качество кода"
    weight: 0.3
    description: "Код читаемый, соответствует PEP8, есть комментарии"
  
  - name: "Документация и отчет"
    weight: 0.2
    description: "Отчет содержит цель, задание, код, результаты тестов, выводы"
  
  - name: "Тестирование"
    weight: 0.1
    description: "Представлены результаты тестирования с разными данными"

max_score: 10
min_passing_score: 6

examples: |
  Пример правильного отчета:
  1. Титульный лист
  2. Цель работы
  3. Задание согласно варианту
  4. Листинг программы с комментариями
  5. Результаты выполнения (скриншоты)
  6. Выводы

variant_specific:
  variant_1: "Калькулятор с базовыми операциями"
  variant_2: "Конвертер единиц измерения"
  variant_3: "Простой текстовый редактор"
  variant_4: "Менеджер задач (to-do list)"
  variant_5: "Игра 'Угадай число'"
